name: prp_system
description: PRP — Personal Resource Planner
publish_to: 'none'
version: 4.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.12.2

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Local storage
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5


  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # UI
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # Fonts
  google_fonts: ^6.2.1

  # URL
  url_launcher: ^6.3.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  equatable: ^2.0.8
  http: ^1.6.0
  image_picker: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-Black.ttf
          weight: 900

